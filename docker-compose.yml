version: "3.8"

networks:
  workspace_net:
    name: workspace_net
    external: false

volumes:
  postgres-data:
  redis-data:
  authentik-media:
  authentik-certs:
  gitea-data:
  ollama-data:
  openwebui-data:
  codeserver-data:
  mattermost-data:
  outline-data:
  coolify-data:
  opencode-data:
  restic-data:
  grafana-data:
  prometheus-data:
  traefik-data:

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  traefik:
    image: traefik:v3.0
    container_name: vpsik-traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-data:/etc/traefik
    networks:
      - workspace_net
    logging: *default-logging

  postgres:
    image: postgres:16-alpine
    container_name: vpsik-postgres
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vpsik}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vpsik}
      POSTGRES_DB: ${POSTGRES_DB:-vpsik}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - workspace_net
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: vpsik-redis
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - workspace_net
    logging: *default-logging

  workspace-api:
    build:
      context: ./workspace-api
      dockerfile: Dockerfile
    container_name: vpsik-api
    expose:
      - "8081"
    environment:
      API_PORT: "8081"
      API_JWT_SECRET: ${API_JWT_SECRET:-change-me-in-production}
      API_USERNAME: ${API_USERNAME:-admin}
      API_PASSWORD: ${API_PASSWORD:-admin}
      SERVICES_GITEA_URL: ${GITEA_URL:-http://gitea:3000}
      SERVICES_GITEA_TOKEN: ${GITEA_TOKEN:-}
      SERVICES_COOLIFY_URL: ${COOLIFY_URL:-http://coolify:3000}
      SERVICES_COOLIFY_TOKEN: ${COOLIFY_TOKEN:-}
      SERVICES_OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      SERVICES_OPENCODE_URL: ${OPENCODE_URL:-}
      SERVICES_OPENCODE_TOKEN: ${OPENCODE_TOKEN:-}
      SERVICES_RESTIC_REPO_URL: ${RESTIC_REPO:-/data/restic}
      SERVICES_RESTIC_PASSWORD: ${RESTIC_PASSWORD:-}
    volumes:
      - restic-data:/data/restic
    networks:
      - workspace_net
    depends_on:
      - postgres
    logging: *default-logging
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${VPSIK_DOMAIN:-workspace.vpsik.com}`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.services.api.loadbalancer.server.port=8081"

  workspace-dashboard:
    build:
      context: ./workspace-dashboard
      dockerfile: Dockerfile
    container_name: vpsik-dashboard
    expose:
      - "3000"
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8081}
      NEXT_PUBLIC_OPENWEBUI_URL: ${PUBLIC_OPENWEBUI_URL:-http://openwebui:8080}
    networks:
      - workspace_net
    depends_on:
      - workspace-api
    logging: *default-logging
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`${VPSIK_DOMAIN:-workspace.vpsik.com}`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.services.dashboard.loadbalancer.server.port=3000"

  grafana:
    image: grafana/grafana:latest
    container_name: vpsik-grafana
    expose:
      - "3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - workspace_net
    logging: *default-logging
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`metrics.${VPSIK_DOMAIN:-workspace.vpsik.com}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  prometheus:
    image: prom/prometheus:latest
    container_name: vpsik-prometheus
    expose:
      - "9090"
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - workspace_net
    logging: *default-logging
