global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "workspace-api"
    static_configs:
      - targets: ["workspace-api:8081"]
    metrics_path: "/api/health"
